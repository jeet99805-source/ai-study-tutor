<!DOCTYPE html>
<html>

<head>

<title>AI Study Tutor</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:260px;
background:#020617;
padding:20px;
}

#sidebar h2{
font-size:18px;
margin-bottom:20px;
}

select,input{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:15px;
padding:12px;
border-radius:8px;
max-width:60%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
}

#inputArea{
display:flex;
padding:15px;
background:#020617;
}

#question{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
margin-left:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">

<h2>⚙ Settings</h2>

<input id="apiKey" placeholder="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">

<select id="model">
<option value="mistralai/mistral-7b-instruct">Mistral 7B</option>
<option value="meta-llama/llama-3-8b-instruct">Llama 3</option>
<option value="openchat/openchat-7b">OpenChat</option>
<option value="nousresearch/nous-hermes-2-mixtral">Hermes Mixtral</option>
</select>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input id="question" placeholder="Ask accounting or math question">

<button onclick="ask()">Send</button>

</div>

</div>

<script>

let messages=[
{
role:"system",
content:"You are a helpful tutor for accounting and math."
}
]

async function ask(){

let apiKey=document.getElementById("apiKey").value
let model=document.getElementById("model").value

let input=document.getElementById("question")
let question=input.value

if(question==="") return

let chat=document.getElementById("chat")

chat.innerHTML+=`<div class="message user">${question}</div>`

messages.push({role:"user",content:question})

input.value=""

let response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({
model:model,
messages:messages
})

})

let data=await response.json()

let answer=data.choices[0].message.content

messages.push({role:"assistant",content:answer})

chat.innerHTML+=`<div class="message ai">${answer}</div>`

chat.scrollTop=chat.scrollHeight

}

</script>

</body>

</html>
