<!DOCTYPE html>
<html>

<head>

<title>AI Study Tutor</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:700px;
height:90vh;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

#header{
padding:15px;
background:#111827;
font-size:20px;
font-weight:bold;
text-align:center;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:15px;
padding:10px 15px;
border-radius:10px;
max-width:80%;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.ai{
background:#374151;
}

#inputArea{
display:flex;
padding:15px;
background:#111827;
}

#question{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="app">

<div id="header">
AI Study Tutor
</div>

<div id="chat"></div>

<div id="inputArea">

<input id="question" placeholder="Ask anything about accounting or math...">

<button onclick="ask()">Send</button>

</div>

</div>

<script>

const API_KEY = "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"

let messages = [
{
role:"system",
content:"You are a professional tutor helping students learn accounting and math clearly."
}
]

async function ask(){

let input=document.getElementById("question")
let question=input.value

if(question==="") return

let chat=document.getElementById("chat")

chat.innerHTML += `<div class="message user"><b>You:</b> ${question}</div>`

messages.push({role:"user",content:question})

input.value=""

let response = await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
model:"mistralai/mistral-7b-instruct",
messages:messages
})

})

let data=await response.json()

let answer=data.choices[0].message.content

messages.push({role:"assistant",content:answer})

chat.innerHTML += `<div class="message ai"><b>AI:</b> ${answer}</div>`

chat.scrollTop = chat.scrollHeight

}

</script>

</body>

</html>
